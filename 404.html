<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    // GitHub Pages SPA redirect: manda para index.html preservando a rota
    var seg = window.location.pathname.split('/').slice(0, 2).join('/');
    var path = window.location.href.replace(window.location.origin + seg, '');
    sessionStorage.setItem('spa-redirect', path || '/');
    window.location.replace(window.location.origin + seg + '/');
  </script>
</head>
<body></body>
</html>
