<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dashboard de Produção</title>
  <style>
    @font-face{font-family:'Sebino';src:url('sebino font/Sebino-Font/Sebino-Regular.ttf') format('truetype');font-weight:400;font-style:normal;font-display:swap}
    @font-face{font-family:'Sebino';src:url('sebino font/sebino-medium_freefontdownload_org/sebino-medium/sebino-medium.ttf') format('truetype');font-weight:500;font-style:normal;font-display:swap}
    @font-face{font-family:'Sebino';src:url('sebino font/Sebino-Font-bold/sebino-bold/sebino-bold.ttf') format('truetype');font-weight:700;font-style:normal;font-display:swap}
    @font-face{font-family:'Sebino';src:url('sebino font/sebino-heavy_freefontdownload_org/sebino-heavy/sebino-heavy.ttf') format('truetype');font-weight:800;font-style:normal;font-display:swap}
    @font-face{font-family:'Sebino';src:url('sebino font/sebino-black_freefontdownload_org/sebino-black/sebino-black.ttf') format('truetype');font-weight:900;font-style:normal;font-display:swap}
    html,body{margin:0;padding:0;overflow-x:hidden;font-family:'Sebino','Segoe UI',sans-serif}
    body{min-height:100vh;background:#F5F6FA}
    input[type="password"]::-ms-reveal,input[type="password"]::-ms-clear{display:none!important}
    input::-webkit-credentials-auto-fill-button,input::-webkit-contacts-auto-fill-button{display:none!important;visibility:hidden}
  </style>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
<div id="root">
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:linear-gradient(160deg,#003366 0%,#0066B3 100%)">
    <div style="background:#fff;padding:8px 16px;border-radius:4px;display:flex;align-items:center">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 5991 4192" width="129" height="90" style="shape-rendering:geometricPrecision">
        <polygon style="fill:#003366;fill-rule:nonzero" points="461,466 461,2795 922,2795 922,932 1383,932 1383,2795 1844,2795 1844,932 2304,932 2304,3261 0,3261 0,0 5991,0 5991,466 "/>
        <path style="fill:#003366;fill-rule:nonzero" d="M4148 2329l0 -1397 -1383 0 0 2329 1383 0 0 -466 -922 0 0 -466 922 0zm-461 -466l-461 0 0 -466 461 0 0 466z"/>
        <path style="fill:#003366;fill-rule:nonzero" d="M5991 932l-1382 0 0 2329 922 0 0 466 -5531 0 0 465 5991 0 0 -3260zm-461 1863l-461 0 0 -1398 461 0 0 1398z"/>
      </svg>
    </div>
    <div style="color:#fff;font-size:16px;font-family:'Sebino','Segoe UI',sans-serif;font-weight:700;letter-spacing:0.5px">Dashboard de Produção</div>
    <div style="color:#8BACC8;font-size:13px;font-family:'Sebino','Segoe UI',sans-serif;font-weight:400">Carregando...</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('[SW] Registrado:', reg.scope))
        .catch(err => console.warn('[SW] Falha no registro:', err));
    });
  }
</script>
</body>
</html>
